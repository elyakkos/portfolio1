name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # или master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Forces all JavaScript actions to execute with Node.js 24 ahead of the deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated to v6

      - name: Install, build, and upload your site
        uses: withastro/action@v4 # Updated to v4 for Node 24 support
        with:
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
