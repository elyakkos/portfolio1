name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # или master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Обновлено с v4 до v6
      - name: Install, build, and upload your site
        uses: withastro/action@v4 # Обновлено с v3 до v4
        with:
             package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
